name: "android-smoke-test"

# 仅用于在 GitHub 提供的带 KVM 的 ubuntu runner 上启动 Android 模拟器，
# 安装构建产物 APK 并抓取 logcat，定位「构建成功但运行白屏」的真实运行时报错。
# 不发布任何产物，只把日志作为 artifact + commit comment 公开发布，便于无登录读取。

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/Android-SmokeTest.yml"
      - "src-tauri/**"
      - "src/**"
      - "index.html"
      - "package.json"
      - "vite.config.ts"

jobs:
  smoke-test:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and Platform
        run: |
          sdkmanager "ndk;27.2.12479018"
          sdkmanager "platforms;android-30"
          sdkmanager "platforms;android-35"
          sdkmanager "build-tools;35.0.0"
          # 模拟器系统镜像（x86_64，runner 支持 KVM 硬件加速）
          # 用 api 30，启动快、稳定
          sdkmanager "system-images;android-30;google_apis;x86_64"
          yes | sdkmanager --licenses || true

      - name: Set Android environment variables
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0777"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.5.0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # x86_64: 模拟器抓 logcat 用(runner 只有 x86_64 系统镜像能硬件加速)
          targets: x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: rm -f pnpm-lock.yaml && pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Bring Cargo.lock to latest compatible versions
        working-directory: src-tauri
        run: rm -f Cargo.lock

      - name: Initialize Tauri Android project
        run: pnpm tauri android init

      - name: Generate debug signing keystore (reuse release-style setup)
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/debug.jks"
          keytool -genkeypair -noprompt -v \
            -keystore "$KEYSTORE_PATH" \
            -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=jmcomic-downloader, O=tauri, C=US"

          cat > src-tauri/gen/android/keystore.properties <<EOF
          keyAlias=debug
          password=android
          storeFile=${KEYSTORE_PATH}
          EOF

          cat >> src-tauri/gen/android/app/build.gradle.kts <<'GRADLE_EOF'

          // Tauri 生成的模板顶部已 import java.util.Properties，这里直接复用，不要重复 import
          val keystorePropertiesFile = rootProject.file("keystore.properties")
          val keystoreProperties = Properties().apply {
              if (keystorePropertiesFile.exists()) {
                  keystorePropertiesFile.inputStream().use { load(it) }
              }
          }
          android {
              signingConfigs {
                  create("release") {
                      keyAlias = keystoreProperties.getProperty("keyAlias")
                      keyPassword = keystoreProperties.getProperty("password")
                      storeFile = file(keystoreProperties.getProperty("storeFile"))
                      storePassword = keystoreProperties.getProperty("password")
                  }
              }
              buildTypes {
                  getByName("release") {
                      isMinifyEnabled = false
                      isShrinkResources = false
                      signingConfig = signingConfigs.getByName("release")
                  }
              }
          }
          GRADLE_EOF

      - name: Build Android APK (x86_64 only, debug)
        run: |
          set -x
          mkdir -p logs
          # 只构建 x86_64 debug APK，模拟器用，构建快
          # 注意：tauri android build 的 --target 接受的是简称(x86_64)，不是完整 triple
          pnpm tauri android build --apk --target x86_64 -v 2>&1 | tee logs/build.log
          exit ${PIPESTATUS[0]}

      - name: Locate built APK
        id: apk
        run: |
          set -x
          find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" | tee logs/apk-list.txt
          APK=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"

      - name: Boot Android Emulator and capture logcat
        # 用 reactivecircus/android-emulator-runner：它负责启动模拟器并等到 sys.boot_completed
        # 再跑 script。之前手动启动会卡在冷启动。script 里所有 adb 调用一律用 timeout 包裹，
        # 避免任何一条 adb 命令挂起导致整个 script 被隐藏超时 kill。
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -no-metrics
          disable-animations: true
          emulator-boot-timeout: 600
          script: |
            set +e
            mkdir -p logs

            echo "=== adb devices ===" | tee logs/adb-devices.log
            timeout 15 adb devices | tee -a logs/adb-devices.log

            echo "=== 安装 APK ===" | tee logs/install.log
            timeout 180 adb install -r -t "${{ steps.apk.outputs.apk_path }}" 2>&1 | tee -a logs/install.log
            echo "install exit=$?" | tee -a logs/install.log

            timeout 15 adb logcat -c 2>&1 | tee -a logs/install.log

            # 扩大 logcat 环形缓冲区到 16M 并清空，避免其他 app 日志把本 app 挤掉
            # 之后用 adb logcat -d 一次性 dump 即可拿到 app 启动/崩溃日志
            timeout 15 adb logcat -G 16M 2>&1 | tee logs/clear.log
            timeout 15 adb logcat -c 2>&1 | tee -a logs/clear.log
            sleep 1

            echo "=== 启动应用主 Activity ===" | tee logs/start.log
            # 正确的 Activity component(由 resolve-activity 确认): com.lanyeeee.jmcomic_downloader/.MainActivity
            timeout 30 adb shell am start -n "com.lanyeeee.jmcomic_downloader/.MainActivity" 2>&1 | tee -a logs/start.log
            echo "am start exit=$?" | tee -a logs/start.log
            # monkey 作为兜底启动方式(通过 LAUNCHER intent)
            timeout 30 adb shell monkey -p "com.lanyeeee.jmcomic_downloader" -c "android.intent.category.LAUNCHER" 1 2>&1 | tee -a logs/start.log
            # 解析出真正的启动 Activity，确认 component 名是否正确
            timeout 15 adb shell cmd package resolve-activity --brief com.lanyeeee.jmcomic_downloader 2>&1 | tee -a logs/start.log

            echo "=== 等待 30 秒收集日志 ===" | tee logs/wait.log
            sleep 30

            # 取应用 PID
            APID=$(timeout 15 adb shell pidof com.lanyeeee.jmcomic_downloader 2>/dev/null | tr -d '\r' | awk '{print $1}')
            echo "app pid=$APID" | tee logs/app-pid.log

            echo "=== dump 全缓冲区 logcat (16M 缓冲区，一次性 -d) ===" | tee logs/logcat-dump-all.log
            timeout 90 adb logcat -d -v threadtime -b main -b system -b crash 2>&1 | tee logs/logcat-dump-all.log

            echo "=== logcat 中与 app 相关的行 ===" | tee logs/logcat-app.log
            grep -iE "jmcomic|tauri|rust|panic|wry|webview|chromium|fatal|AndroidRuntime|consoleMessage|==== PANIC ====|FATAL EXCEPTION|signal [0-9]|abort|tombstone|\.MainActivity" logs/logcat-dump-all.log 2>/dev/null | tee -a logs/logcat-app.log

            echo "=== logcat 中含 FATAL/crash 的行 ===" | tee logs/logcat-crash.log
            grep -iE "FATAL EXCEPTION|AndroidRuntime|data_app_crash|data_app_native_crash|signal [0-9]|SIGSEGV|tombstone|jmcomic_downloader.*Exception" logs/logcat-dump-all.log 2>/dev/null | tee -a logs/logcat-crash.log

            echo "=== 应用进程专属 logcat (pid=$APID) ===" | tee logs/logcat-app-pid.log
            if [ -n "$APID" ]; then
              grep -E " $APID " logs/logcat-dump-all.log 2>/dev/null | tee -a logs/logcat-app-pid.log
            fi
            # 不管 pidof 是否拿到，都把 "Start proc ... jmcomic_downloader" 这行之后的全部日志单独存一份
            # 这是最关键的：app 进程起来之后到底干了什么(panic/webview/报错)
            echo "=== app 进程启动后的全部日志 (从 Start proc jmcomic 起) ===" | tee logs/logcat-after-start.log
            awk '/Start proc [0-9]+:com\.lanyeeee\.jmcomic_downloader/{found=1} found{print}' logs/logcat-dump-all.log 2>/dev/null | tee -a logs/logcat-after-start.log
            LINES=$(wc -l < logs/logcat-after-start.log 2>/dev/null || echo 0)
            echo "logcat-after-start 行数: $LINES" | tee -a logs/logcat-after-start.log

            echo "=== ps 确认进程是否还活着 ===" | tee logs/ps.log
            timeout 15 adb shell "ps -A | grep jmcomic" 2>&1 | tee -a logs/ps.log
            timeout 15 adb shell pidof com.lanyeeee.jmcomic_downloader 2>&1 | tee -a logs/ps.log

            echo "=== tombstone 文件列表 ===" | tee logs/tombstones.log
            timeout 20 adb shell ls -la /data/tombstones/ 2>&1 | tee -a logs/tombstones.log

            echo "=== dropbox 全部(app 相关) ===" | tee logs/dropbox.log
            timeout 30 adb shell dumpsys dropbox --print 2>&1 | tee logs/dropbox-all.log
            grep -iE "jmcomic|data_app_crash|data_app_native|data_app_anr" logs/dropbox-all.log 2>/dev/null | tail -60 | tee -a logs/dropbox.log

            echo "=== logcat-dump-all 末尾 200 行(兜底) ===" | tee logs/logcat-full.log
            tail -200 logs/logcat-dump-all.log 2>/dev/null | tee -a logs/logcat-full.log

            echo "=== 当前 Activity 栈 ===" | tee logs/activity-stack.log
            timeout 30 adb shell dumpsys activity activities 2>&1 | tee logs/activity-stack-full.log
            grep -iE "mResumedActivity|topResumedActivity|jmcomic|ResumedActivity" logs/activity-stack-full.log | tee -a logs/activity-stack.log

            echo "=== 截图 ===" | tee logs/screenshot.log
            timeout 30 adb shell screencap -p /sdcard/screen.png 2>&1 | tee -a logs/screenshot.log
            timeout 30 adb pull /sdcard/screen.png logs/screen.png 2>&1 | tee -a logs/screenshot.log

            # 永远返回 0，让 upload/comment 步骤能跑
            exit 0

      - name: Upload smoke-test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-smoke-logs
          path: logs/
          if-no-files-found: ignore

      - name: Post smoke-test logcat as commit comment (publicly readable)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(mktemp)
          {
            echo "## Android smoke-test 运行时日志"
            echo ""
            echo "构建产物在模拟器上启动后抓取的 logcat，用于定位白屏根因。"
            echo ""
            echo "### logcat-app.log (后台实时抓取，过滤 app/关键词)"
            echo '```'
            tail -500 logs/logcat-app.log 2>/dev/null || echo "(无)"
            echo '```'
            echo ""
            echo "### logcat-after-start.log (app 进程启动后的全部日志，最关键!)"
            echo '```'
            tail -600 logs/logcat-after-start.log 2>/dev/null || echo "(无)"
            echo '```'
            echo ""
            echo "### logcat-app-pid.log (app pid 行)"
            echo '```'
            tail -200 logs/logcat-app-pid.log 2>/dev/null || echo "(无)"
            echo '```'
            echo ""
            echo "### ps.log (进程是否存活)"
            echo '```'
            cat logs/ps.log 2>/dev/null || echo "(无)"
            echo '```'
            echo ""
            echo "### tombstones.log"
            echo '```'
            cat logs/tombstones.log 2>/dev/null || echo "(无)"
            echo '```'
            echo ""
            echo "### dropbox.log"
            echo '```'
            cat logs/dropbox.log 2>/dev/null || echo "(无)"
            echo '```'
            echo ""
            echo "### logcat-crash.log (FATAL/crash 行)"
            echo '```'
            tail -400 logs/logcat-crash.log 2>/dev/null || echo "(无)"
            echo '```'
            echo ""
            echo "### dropbox.log (dropbox 崩溃/ANR 记录)"
            echo '```'
            cat logs/dropbox.log 2>/dev/null || echo "(无)"
            echo '```'
            echo ""
            echo "### app-pid.log"
            echo '```'
            cat logs/app-pid.log 2>/dev/null || echo "(无)"
            echo '```'
            echo ""
            echo "### clear.log (logcat 缓冲区扩大/清空)"
            echo '```'
            cat logs/clear.log 2>/dev/null || echo "(无)"
            echo '```'
            echo ""
            echo "### logcat-dump-all.log 大小"
            echo '```'
            wc -l logs/logcat-dump-all.log 2>/dev/null || echo "(无)"
            echo '```'
            echo ""
            echo "### logcat-full.log 末尾 200 行(兜底)"
            echo '```'
            tail -200 logs/logcat-full.log 2>/dev/null || echo "(无)"
            echo '```'
            echo ""
            echo "### install.log"
            echo '```'
            cat logs/install.log 2>/dev/null || echo "(无)"
            echo '```'
            echo ""
            echo "### start.log"
            echo '```'
            cat logs/start.log 2>/dev/null || echo "(无)"
            echo '```'
            echo ""
            echo "### activity-stack.log"
            echo '```'
            cat logs/activity-stack.log 2>/dev/null || echo "(无)"
            echo '```'
            echo ""
            echo "### logcat-full.log 末尾 150 行(兜底)"
            echo '```'
            tail -150 logs/logcat-full.log 2>/dev/null || echo "(无)"
            echo '```'
            echo ""
            echo "### build.log 末尾 30 行"
            echo '```'
            tail -30 logs/build.log 2>/dev/null || echo "(无)"
            echo '```'
          } > "$BODY"

          head -c 60000 "$BODY" > "${BODY}.trim"
          jq -Rs '{body: .}' < "${BODY}.trim" > "${BODY}.json"
          echo "=== Posting comment (size=$(wc -c < ${BODY}.trim)) ==="
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            --data-binary "@${BODY}.json" | head -20
          echo "=== comment post done ==="
