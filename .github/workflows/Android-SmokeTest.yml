name: "android-smoke-test"

# 仅用于在 GitHub 提供的带 KVM 的 ubuntu runner 上启动 Android 模拟器，
# 安装构建产物 APK 并抓取 logcat，定位「构建成功但运行白屏」的真实运行时报错。
# 不发布任何产物，只把日志作为 artifact + commit comment 公开发布，便于无登录读取。

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/Android-SmokeTest.yml"
      - "src-tauri/**"
      - "src/**"
      - "index.html"
      - "package.json"
      - "vite.config.ts"

jobs:
  smoke-test:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and Platform
        run: |
          sdkmanager "ndk;27.2.12479018"
          sdkmanager "platforms;android-34"
          sdkmanager "platforms;android-35"
          sdkmanager "build-tools;35.0.0"
          # 模拟器相关组件
          sdkmanager "emulator"
          sdkmanager "platform-tools"
          # 模拟器系统镜像（x86_64，runner 支持 KVM 硬件加速）
          # 用 api 34，比 35 更稳定
          sdkmanager "system-images;android-34;google_apis;x86_64"
          yes | sdkmanager --licenses || true

      - name: Set Android environment variables
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0777"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.5.0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # x86_64: 模拟器抓 logcat 用(runner 只有 x86_64 系统镜像能硬件加速)
          targets: x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: rm -f pnpm-lock.yaml && pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Bring Cargo.lock to latest compatible versions
        working-directory: src-tauri
        run: rm -f Cargo.lock

      - name: Initialize Tauri Android project
        run: pnpm tauri android init

      - name: Generate debug signing keystore (reuse release-style setup)
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/debug.jks"
          keytool -genkeypair -noprompt -v \
            -keystore "$KEYSTORE_PATH" \
            -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=jmcomic-downloader, O=tauri, C=US"

          cat > src-tauri/gen/android/keystore.properties <<EOF
          keyAlias=debug
          password=android
          storeFile=${KEYSTORE_PATH}
          EOF

          cat >> src-tauri/gen/android/app/build.gradle.kts <<'GRADLE_EOF'

          // Tauri 生成的模板顶部已 import java.util.Properties，这里直接复用，不要重复 import
          val keystorePropertiesFile = rootProject.file("keystore.properties")
          val keystoreProperties = Properties().apply {
              if (keystorePropertiesFile.exists()) {
                  keystorePropertiesFile.inputStream().use { load(it) }
              }
          }
          android {
              signingConfigs {
                  create("release") {
                      keyAlias = keystoreProperties.getProperty("keyAlias")
                      keyPassword = keystoreProperties.getProperty("password")
                      storeFile = file(keystoreProperties.getProperty("storeFile"))
                      storePassword = keystoreProperties.getProperty("password")
                  }
              }
              buildTypes {
                  getByName("release") {
                      isMinifyEnabled = false
                      isShrinkResources = false
                      signingConfig = signingConfigs.getByName("release")
                  }
              }
          }
          GRADLE_EOF

      - name: Build Android APK (x86_64 only, debug)
        run: |
          set -x
          mkdir -p logs
          # 只构建 x86_64 debug APK，模拟器用，构建快
          # 注意：tauri android build 的 --target 接受的是简称(x86_64)，不是完整 triple
          pnpm tauri android build --apk --target x86_64 -v 2>&1 | tee logs/build.log
          exit ${PIPESTATUS[0]}

      - name: Locate built APK
        id: apk
        run: |
          set -x
          find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" | tee logs/apk-list.txt
          APK=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"

      - name: Boot Android Emulator manually and capture logcat
        # 不用 reactivecircus/android-emulator-runner：它在 script 内部有隐藏的执行
        # 超时，遇到 adb shell 挂起会直接 kill 整个 script，导致 logs/ 全空。
        # 这里自己后台启动 emulator，完全掌控超时与日志捕获。
        shell: bash
        timeout-minutes: 20
        run: |
          set +e
          mkdir -p logs

          export ANDROID_AVD_HOME="$HOME/.android/avd"
          echo "no" | avdmanager create avd \
            -n test34 -k "system-images;android-34;google_apis;x86_64" -f || true

          echo "=== 启动 emulator (后台) ===" | tee logs/emulator-start.log
          nohup "$ANDROID_HOME/emulator/emulator" -avd test34 \
            -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot \
            -no-metrics -netdelay none -netspeed full \
            > logs/emulator-stdout.log 2>&1 &
          EMU_PID=$!
          echo "emulator pid=$EMU_PID" | tee -a logs/emulator-start.log

          echo "=== 等待设备上线 (最多 180s) ===" | tee logs/boot.log
          adb wait-for-device 2>&1 | tee -a logs/boot.log
          # 关键：用 start-server 确保 adb 连上
          adb start-server 2>&1 | tee -a logs/boot.log

          echo "=== 轮询 sys.boot_completed (最多 150s) ===" | tee -a logs/boot.log
          BOOT_OK=0
          for i in $(seq 1 75); do
            BOOT=$(timeout 10 adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            echo "[$i] boot_completed='$BOOT'" | tee -a logs/boot.log
            if [ "$BOOT" = "1" ]; then BOOT_OK=1; break; fi
            sleep 2
          done
          echo "BOOT_OK=$BOOT_OK" | tee -a logs/boot.log
          # 再等一会儿让系统稳定
          sleep 10

          echo "=== adb devices ===" | tee logs/adb-devices.log
          adb devices | tee -a logs/adb-devices.log

          echo "=== 安装 APK ===" | tee logs/install.log
          timeout 120 adb install -r -t "${{ steps.apk.outputs.apk_path }}" 2>&1 | tee -a logs/install.log
          echo "install exit=$?" | tee -a logs/install.log

          # 清空旧 logcat
          adb logcat -c 2>/dev/null

          echo "=== 启动应用主 Activity ===" | tee logs/start.log
          PKG="com.lanyeeee.jmcomic_downloader"
          timeout 30 adb shell am start -n "$PKG/com.tauri.MainActivity" 2>&1 | tee -a logs/start.log
          START_EXIT=$?
          echo "am start exit=$START_EXIT" | tee -a logs/start.log
          if [ "$START_EXIT" -ne 0 ]; then
            timeout 30 adb shell monkey -p "$PKG" -c android.intent.category.LAUNCHER 1 2>&1 | tee -a logs/start.log
          fi

          echo "=== 等待 30 秒收集日志 ===" | tee logs/wait.log
          sleep 30

          echo "=== 抓取全量 logcat ===" | tee logs/logcat-full.log
          timeout 60 adb logcat -d -v time 2>&1 | tee -a logs/logcat-full.log
          echo "=== 抓取 crash 相关 (*:E) ===" | tee logs/logcat-error.log
          timeout 60 adb logcat -d -v time *:E 2>&1 | tee -a logs/logcat-error.log
          echo "=== 抓取 Tauri/Rust/WebView 相关 ===" | tee logs/logcat-app.log
          timeout 60 adb logcat -d -v time 2>&1 | grep -iE "tauri|rust|panic|wry|webview|chromium|jmcomic|fatal|AndroidRuntime|consoleMessage|==== PANIC ====" | tee -a logs/logcat-app.log

          echo "=== 当前 Activity 栈 ===" | tee logs/activity-stack.log
          timeout 30 adb shell dumpsys activity activities 2>&1 | grep -iE "mResumedActivity|topResumedActivity|jmcomic|ResumedActivity" | tee -a logs/activity-stack.log

          echo "=== 截图 ===" | tee logs/screenshot.log
          timeout 30 adb shell screencap -p /sdcard/screen.png 2>&1 | tee -a logs/screenshot.log
          timeout 30 adb pull /sdcard/screen.png logs/screen.png 2>&1 | tee -a logs/screenshot.log

          # 关掉 emulator
          kill $EMU_PID 2>/dev/null || true
          exit 0

      - name: Upload smoke-test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-smoke-logs
          path: logs/
          if-no-files-found: ignore

      - name: Post smoke-test logcat as commit comment (publicly readable)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(mktemp)
          {
            echo "## Android smoke-test 运行时日志"
            echo ""
            echo "构建产物在模拟器上启动后抓取的 logcat，用于定位白屏根因。"
            echo ""
            echo "### logcat-app.log (Tauri/Rust/WebView/panic 相关)"
            echo '```'
            tail -300 logs/logcat-app.log 2>/dev/null || echo "(无)"
            echo '```'
            echo ""
            echo "### logcat-error.log (*:E)"
            echo '```'
            tail -200 logs/logcat-error.log 2>/dev/null || echo "(无)"
            echo '```'
            echo ""
            echo "### install.log"
            echo '```'
            cat logs/install.log 2>/dev/null || echo "(无)"
            echo '```'
            echo ""
            echo "### start.log"
            echo '```'
            cat logs/start.log 2>/dev/null || echo "(无)"
            echo '```'
            echo ""
            echo "### boot.log"
            echo '```'
            cat logs/boot.log 2>/dev/null || echo "(无)"
            echo '```'
            echo ""
            echo "### adb-devices.log"
            echo '```'
            cat logs/adb-devices.log 2>/dev/null || echo "(无)"
            echo '```'
            echo ""
            echo "### activity-stack.log"
            echo '```'
            cat logs/activity-stack.log 2>/dev/null || echo "(无)"
            echo '```'
            echo ""
            echo "### logcat-full.log 末尾 200 行(兜底，确保能看到模拟器是否真的启动)"
            echo '```'
            tail -200 logs/logcat-full.log 2>/dev/null || echo "(无)"
            echo '```'
            echo ""
            echo "### emulator-stdout.log 末尾 80 行(模拟器自身启动输出，诊断启动失败)"
            echo '```'
            tail -80 logs/emulator-stdout.log 2>/dev/null || echo "(无)"
            echo '```'
            echo ""
            echo "### build.log 末尾 30 行"
            echo '```'
            tail -30 logs/build.log 2>/dev/null || echo "(无)"
            echo '```'
          } > "$BODY"

          head -c 60000 "$BODY" > "${BODY}.trim"
          jq -Rs '{body: .}' < "${BODY}.trim" > "${BODY}.json"
          echo "=== Posting comment (size=$(wc -c < ${BODY}.trim)) ==="
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            --data-binary "@${BODY}.json" | head -20
          echo "=== comment post done ==="
