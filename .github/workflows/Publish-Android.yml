name: "publish-android"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/Publish-Android.yml"

jobs:
  android-build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and Platform
        run: |
          sdkmanager "ndk;27.2.12479018"
          sdkmanager "platforms;android-35"
          sdkmanager "build-tools;35.0.0"

      - name: Set Android environment variables
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.5.0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: rm -f pnpm-lock.yaml && pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Debug - Check environment
        run: |
          echo "=== Tauri CLI ==="
          pnpm tauri --version
          echo "=== ANDROID_HOME ==="
          echo $ANDROID_HOME
          echo "=== ANDROID_NDK_HOME ==="
          echo $ANDROID_NDK_HOME
          ls -la $ANDROID_NDK_HOME || echo "NDK dir not found"

      - name: Initialize Tauri Android project
        run: pnpm tauri android init

      - name: Debug - Verify Android project
        run: ls -la src-tauri/gen/android/

      - name: Generate release signing keystore
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/release.jks"
          keytool -genkeypair -noprompt -v \
            -keystore "$KEYSTORE_PATH" \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=jmcomic-downloader, O=tauri, C=US"
          echo "KEYSTORE_PATH=$KEYSTORE_PATH" >> $GITHUB_ENV

      - name: Configure Android release signing
        run: |
          # keystore.properties is read by the gradle snippet appended below.
          cat > src-tauri/gen/android/keystore.properties <<EOF
          keyAlias=release
          password=android
          storeFile=${KEYSTORE_PATH}
          EOF

          # Append signing setup to the generated build.gradle.kts. Tauri's
          # default template does NOT configure release signing, which leaves
          # APKs unsigned (won't install) and AAB builds failing. We use
          # fully-qualified java.util.Properties / java.io.FileInputStream so
          # we don't need to inject imports at the top of the file.
          cat >> src-tauri/gen/android/app/build.gradle.kts <<'GRADLE_EOF'

          val keystorePropertiesFile = rootProject.file("keystore.properties")
          val keystoreProperties = java.util.Properties()
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(java.io.FileInputStream(keystorePropertiesFile))
          }

          android {
              signingConfigs {
                  create("release") {
                      keyAlias = keystoreProperties["keyAlias"] as String
                      keyPassword = keystoreProperties["password"] as String
                      storeFile = file(keystoreProperties["storeFile"] as String)
                      storePassword = keystoreProperties["password"] as String
                  }
              }
              buildTypes {
                  getByName("release") {
                      signingConfig = signingConfigs.getByName("release")
                  }
              }
          }
          GRADLE_EOF

          echo "=== keystore.properties ==="
          cat src-tauri/gen/android/keystore.properties
          echo "=== Tail of build.gradle.kts ==="
          tail -30 src-tauri/gen/android/app/build.gradle.kts

      - name: Build Android APK
        run: pnpm tauri android build --apk

      - name: Build Android AAB
        run: pnpm tauri android build --aab

      - name: Get version
        id: get_version
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Copy APK to release assets
        run: |
          # Tauri produces multiple per-arch APKs plus a universal one. Copy
          # signed release APKs only (skip unsigned/debug variants if any).
          find src-tauri/gen/android/app/build/outputs/apk -name "*-release.apk" ! -name "*-unsigned*" -exec cp {} artifacts/ \;
          for f in artifacts/*.apk; do
            ext="${f##*.}"
            base="${f%.*}"
            mv "$f" "${base}-${{ steps.get_version.outputs.VERSION }}.${ext}"
          done
          ls -la artifacts/

      - name: Copy AAB to release assets
        run: |
          find src-tauri/gen/android/app/build/outputs/bundle -name "*.aab" -exec cp {} artifacts/jmcomic-downloader_${{ steps.get_version.outputs.VERSION }}_android.aab \;
          ls -la artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-assets
          path: artifacts/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}-android
          name: Android App v${{ steps.get_version.outputs.VERSION }}
          body: |
            Take a look at the assets to download and install this app.
          files: |
            artifacts/*.apk
            artifacts/*.aab
          draft: true
          prerelease: false
