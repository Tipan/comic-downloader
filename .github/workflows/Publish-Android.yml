name: "publish-android"

on:
  workflow_dispatch:

jobs:
  android-build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and Platform
        run: |
          sdkmanager "ndk;27.2.12479018"
          sdkmanager "platforms;android-35"
          sdkmanager "build-tools;35.0.0"

      - name: Set Android environment variables
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.5.0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Debug - Check tools
        run: |
          echo "=== Node ==="
          node --version
          echo "=== pnpm ==="
          pnpm --version
          echo "=== Rust ==="
          rustc --version
          echo "=== Cargo ==="
          cargo --version
          echo "=== Tauri CLI ==="
          pnpm tauri --version || echo "tauri CLI not found"
          echo "=== ANDROID_HOME ==="
          echo $ANDROID_HOME
          echo "=== ANDROID_NDK_HOME ==="
          echo $ANDROID_NDK_HOME
          echo "=== NDK exists ==="
          ls -la $ANDROID_NDK_HOME || echo "NDK dir not found"
          echo "=== Rust targets ==="
          rustup target list --installed

      - name: Build frontend
        run: pnpm build

      - name: Initialize Tauri Android project
        run: pnpm tauri android init || pnpm tauri android init --ci || true

      - name: Debug - List generated Android files
        run: |
          echo "=== gen/android ==="
          ls -la src-tauri/gen/android/ || echo "No gen/android directory"
          echo "=== AndroidManifest.xml ==="
          cat src-tauri/gen/android/app/src/main/AndroidManifest.xml || echo "No AndroidManifest.xml"
          echo "=== build.gradle.kts ==="
          cat src-tauri/gen/android/app/build.gradle.kts || echo "No build.gradle.kts"

      - name: Build Android APK
        run: pnpm tauri android build --apk 2>&1 | tee build-apk.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-apk-log
          path: build-apk.log

      - name: Build Android AAB
        run: pnpm tauri android build --aab

      - name: Get version
        id: get_version
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Copy APK to release assets
        run: |
          find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -exec cp {} artifacts/ \;
          for f in artifacts/*.apk; do
            ext="${f##*.}"
            base="${f%.*}"
            mv "$f" "${base}-${{ steps.get_version.outputs.VERSION }}.${ext}"
          done

      - name: Copy AAB to release assets
        run: |
          find src-tauri/gen/android/app/build/outputs/bundle -name "*.aab" -exec cp {} artifacts/jmcomic-downloader_${{ steps.get_version.outputs.VERSION }}_android.aab \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-assets
          path: artifacts/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}-android
          name: Android App v${{ steps.get_version.outputs.VERSION }}
          body: |
            Take a look at the assets to download and install this app.
          files: |
            artifacts/*.apk
            artifacts/*.aab
          draft: true
          prerelease: false
