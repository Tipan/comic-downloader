name: "publish-android"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/Publish-Android.yml"
      - "src-tauri/**"
      - "src/**"
      - "package.json"
      - "index.html"
      - "vite.config.ts"

jobs:
  android-build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and Platform
        run: |
          sdkmanager "ndk;27.2.12479018"
          sdkmanager "platforms;android-35"
          sdkmanager "build-tools;35.0.0"

      - name: Set Android environment variables
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.5.0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # 只装 arm64(aarch64)：现代安卓手机/模拟器均为 arm64，
          # 砍掉 armeabi/x86/x86_64 大幅缩小 APK 体积(约 -60%)。
          targets: aarch64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: rm -f pnpm-lock.yaml && pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Bring Cargo.lock to latest compatible versions
        # The committed Cargo.lock pins tauri 2.5.x while the freshly-resolved
        # NPM tree picks tauri-apps/api 2.11.x. Tauri's CLI rejects builds when
        # major.minor differs between Rust crate and NPM package. Drop the
        # lockfile so cargo re-resolves to the latest compatible 2.x — same
        # philosophy as the pnpm-lock.yaml deletion above.
        working-directory: src-tauri
        run: rm -f Cargo.lock

      - name: Debug - Check environment
        run: |
          echo "=== Tauri CLI ==="
          pnpm tauri --version
          echo "=== ANDROID_HOME ==="
          echo $ANDROID_HOME
          echo "=== ANDROID_NDK_HOME ==="
          echo $ANDROID_NDK_HOME
          ls -la $ANDROID_NDK_HOME || echo "NDK dir not found"

      - name: Initialize Tauri Android project
        run: pnpm tauri android init

      - name: Add storage permissions to AndroidManifest
        # Android 11+ scoped storage 限制 app 写公共目录(/storage/emulated/0/Download)。
        # 加 MANAGE_EXTERNAL_STORAGE 让用户可授权 app 访问所有文件，
        # 加 requestLegacyExternalStorage 兼容 Android 10。
        # 前端首次下载前会用 @tauri-apps/plugin-shell 或 native intent 请求权限。
        run: |
          set -x
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          # 在 </application> 前加 requestLegacyExternalStorage
          sed -i 's|<application|<application android:requestLegacyExternalStorage="true"|' "$MANIFEST"
          # 在 </manifest> 前加权限
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />\n    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />\n</manifest>|' "$MANIFEST"
          echo "=== AndroidManifest.xml ==="
          cat "$MANIFEST"

      - name: Copy frontend dist into Android assets (fix white screen)
        # tauri.build.gradle.kts 在当前版本没有把 frontendDist(dist/) 复制进 APK 的
        # assets，导致 WebView 加载 tauri://localhost/index.html 404 → 白屏。
        # 在 build 之前手动把 dist 内容复制到 android 项目的 assets 目录，让后续 gradle
        # 打包自然带上前端资源。
        run: |
          set -x
          ASSETS_DIR="src-tauri/gen/android/app/src/main/assets"
          mkdir -p "$ASSETS_DIR"
          cp -r dist/* "$ASSETS_DIR/"
          echo "=== assets 目录内容 ==="
          ls -la "$ASSETS_DIR/"

      - name: Debug - Verify Android project
        run: ls -la src-tauri/gen/android/

      - name: Generate release signing keystore
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/release.jks"
          keytool -genkeypair -noprompt -v \
            -keystore "$KEYSTORE_PATH" \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=jmcomic-downloader, O=tauri, C=US"
          echo "KEYSTORE_PATH=$KEYSTORE_PATH" >> $GITHUB_ENV

      - name: Configure Android release signing
        run: |
          # keystore.properties is read by the gradle snippet appended below.
          cat > src-tauri/gen/android/keystore.properties <<EOF
          keyAlias=release
          password=android
          storeFile=${KEYSTORE_PATH}
          EOF

          # Append signing setup to the generated build.gradle.kts. Tauri's
          # default template does NOT configure release signing, which leaves
          # APKs unsigned (won't install) and AAB builds failing. Reuse the
          # `Properties` symbol that the template already imports, and use
          # File.inputStream() to avoid needing extra imports at top of file.
          #
          # Also disable R8/ProGuard minification on release: Tauri's default
          # `proguard-rules.pro` does not preserve everything Wry/JNI/Kotlin
          # coroutines need, and stripped classes are the most common cause
          # of black-screen on Android. Size cost is acceptable for now.
          cat >> src-tauri/gen/android/app/build.gradle.kts <<'GRADLE_EOF'

          val keystorePropertiesFile = rootProject.file("keystore.properties")
          val keystoreProperties = Properties().apply {
              if (keystorePropertiesFile.exists()) {
                  keystorePropertiesFile.inputStream().use { load(it) }
              }
          }

          android {
              signingConfigs {
                  create("release") {
                      keyAlias = keystoreProperties.getProperty("keyAlias")
                      keyPassword = keystoreProperties.getProperty("password")
                      storeFile = file(keystoreProperties.getProperty("storeFile"))
                      storePassword = keystoreProperties.getProperty("password")
                  }
              }
              buildTypes {
                  getByName("release") {
                      isMinifyEnabled = false
                      isShrinkResources = false
                      signingConfig = signingConfigs.getByName("release")
                  }
              }
          }
          GRADLE_EOF

          echo "=== keystore.properties ==="
          cat src-tauri/gen/android/keystore.properties
          echo "=== Tail of build.gradle.kts ==="
          tail -30 src-tauri/gen/android/app/build.gradle.kts

      - name: Sanity check tauri CLI
        run: |
          set -x
          pnpm tauri --version
          pnpm tauri android --help || true
          pnpm tauri android build --help || true

      - name: Build Android APK
        id: build_apk
        run: |
          set -x
          mkdir -p logs
          # --target aarch64 只构建 arm64 APK(不打包 universal)，
          # 砍掉 armeabi/x86/x86_64 三个架构的 so，体积大幅缩小。
          pnpm tauri android build --apk --target aarch64 -v 2>&1 | tee logs/apk.log
          # Preserve pipefail-style behavior
          exit ${PIPESTATUS[0]}

      - name: Build Android AAB
        id: build_aab
        if: success() || steps.build_apk.outcome == 'failure'
        run: |
          set -x
          mkdir -p logs
          # AAB 仍构建全架构：Google Play 上传后会按设备拆分分发，
          # 用户实际下载的只是对应架构，不占额外体积。
          pnpm tauri android build --aab -v 2>&1 | tee logs/aab.log
          exit ${PIPESTATUS[0]}

      - name: Dump diagnostics on failure
        if: always()
        run: |
          mkdir -p logs
          echo "=== build.gradle.kts ==="
          cat src-tauri/gen/android/app/build.gradle.kts > logs/build.gradle.kts.txt 2>&1 || true
          echo "=== tauri.conf.json ==="
          cat src-tauri/tauri.conf.json > logs/tauri.conf.json.txt 2>&1 || true
          echo "=== android dir tree (3 levels) ==="
          find src-tauri/gen/android -maxdepth 3 > logs/android-tree.txt 2>&1 || true
          echo "=== apk outputs ==="
          find src-tauri/gen/android/app/build/outputs -type f > logs/apk-outputs.txt 2>&1 || true

      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-logs
          path: logs/
          if-no-files-found: ignore

      - name: Post failure logs as commit comment (visible publicly)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Concatenate the most useful logs into a short body and post as a
          # commit comment so we can read it without auth on the API.
          BODY=$(mktemp)
          {
            echo "## Android build diagnostics"
            echo ""
            echo "### apk.log (last 200 lines)"
            echo '```'
            tail -200 logs/apk.log 2>/dev/null || echo "(no apk.log)"
            echo '```'
            echo ""
            echo "### aab.log (last 100 lines)"
            echo '```'
            tail -100 logs/aab.log 2>/dev/null || echo "(no aab.log)"
            echo '```'
            echo ""
            echo "### build.gradle.kts"
            echo '```kotlin'
            cat logs/build.gradle.kts.txt 2>/dev/null || echo "(missing)"
            echo '```'
            echo ""
            echo "### android tree"
            echo '```'
            cat logs/android-tree.txt 2>/dev/null || echo "(missing)"
            echo '```'
          } > "$BODY"

          # Truncate to fit comment limits (~65k chars; cut at 60k for safety)
          head -c 60000 "$BODY" > "${BODY}.trim"

          # Post via the REST API
          jq -Rs '{body: .}' < "${BODY}.trim" > "${BODY}.json"
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            --data-binary "@${BODY}.json" | head -50

      - name: Get version
        id: get_version
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Copy APK to release assets
        run: |
          # Tauri produces multiple per-arch APKs plus a universal one. Copy
          # signed release APKs only (skip unsigned/debug variants if any).
          find src-tauri/gen/android/app/build/outputs/apk -name "*-release.apk" ! -name "*-unsigned*" -exec cp {} artifacts/ \;
          for f in artifacts/*.apk; do
            ext="${f##*.}"
            base="${f%.*}"
            mv "$f" "${base}-${{ steps.get_version.outputs.VERSION }}.${ext}"
          done
          ls -la artifacts/

      - name: Copy AAB to release assets
        run: |
          find src-tauri/gen/android/app/build/outputs/bundle -name "*.aab" -exec cp {} artifacts/jmcomic-downloader_${{ steps.get_version.outputs.VERSION }}_android.aab \;
          ls -la artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-assets
          path: artifacts/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}-android
          name: Android App v${{ steps.get_version.outputs.VERSION }}
          body: |
            Take a look at the assets to download and install this app.
          files: |
            artifacts/*.apk
            artifacts/*.aab
          draft: false
          prerelease: true
