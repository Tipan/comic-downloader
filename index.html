<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>漫画下载器</title>
  </head>

  <body>
    <div id="app"></div>
    <style>
      /* 触屏优化：去掉点击高亮、防滚动穿透 */
      html, body {
        -webkit-tap-highlight-color: transparent;
        /* contain 而非 none：阻止滚动穿透到 body，但不阻止内部 overflow 容器触摸滚动 */
        overscroll-behavior: contain;
        margin: 0;
        padding: 0;
        height: 100%;
      }
      /* 触摸滚动支持：确保所有 overflow 滚动容器在 Android WebView 上可触摸滑动。
         -webkit-overflow-scrolling 触发硬件加速滚动；
         touch-action: pan-y 允许垂直滑动不触发浏览器手势。 */
      .overflow-auto, .overflow-y-auto, .overflow-x-auto {
        -webkit-overflow-scrolling: touch;
        touch-action: pan-y;
      }
      /* 安全区避让：避开顶部状态栏和底部导航栏，防止内容被遮挡无法触屏。
         --safe-top/--safe-bottom 由下面 JS 从 Android 实际 inset 计算，
         env() 作为 CSS 原生 fallback(viewport-fit=cover 下 Chromium 支持)。 */
      :root {
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --safe-left: env(safe-area-inset-left, 0px);
        --safe-right: env(safe-area-inset-right, 0px);
      }
      #app {
        box-sizing: border-box;
        /* height: 100vh 让 #app 撑满视口，padding(安全区) 包含在内部，
           AppContent 用 h-full 撑满 #app，不会因 padding 溢出 */
        height: 100vh;
        padding-top: var(--safe-top);
        padding-bottom: var(--safe-bottom);
        padding-left: var(--safe-left);
        padding-right: var(--safe-right);
        overflow: hidden;
      }
    </style>
    <!--
      前端运行时错误捕获层。
      在 Android 真机/模拟器上白屏时，把 JS 异常、未捕获的 Promise rejection
      以及加载失败全部打到 console（Tauri 会转发到 logcat），并写入 #app 让屏幕
      直接显示出错信息而非空白，方便定位白屏根因。
    -->
    <script>
      (function () {
        function report(label, detail) {
          var msg = '[' + label + '] ' + (detail && detail.message ? detail.message : detail);
          try { console.error(msg); } catch (e) {}
          try {
            var el = document.getElementById('app');
            if (el) {
              el.insertAdjacentHTML(
                'beforeend',
                '<pre style="white-space:pre-wrap;word-break:break-all;padding:8px;font-size:12px;color:red">' +
                  String(msg).replace(/[&<>]/g, function (c) {
                    return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c];
                  }) +
                  '</pre>'
              );
            }
          } catch (e) {}
        }
        window.addEventListener('error', function (e) {
          report('window.error', e.error || e.message || e);
        });
        window.addEventListener('unhandledrejection', function (e) {
          report('unhandledrejection', e.reason);
        });
        window.__bootError = report;
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
